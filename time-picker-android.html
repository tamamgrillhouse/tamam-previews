<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Επιλογή ώρας — Android 24ωρο</title>
<style>
  :root{
    --accent:#f59e0b; --accent-dark:#d97706; --accent-soft:#fff7ed;
    --bg:#f1f5f9; --white:#fff; --text:#1e293b; --muted:#64748b;
    --border:#e2e8f0; --border-strong:#cbd5e1; --face:#eef2f7;
  }
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); margin:0; padding:28px 16px; line-height:1.5;
    display:flex; flex-direction:column; align-items:center;}
  h1{font-size:22px; margin:0 0 4px; text-align:center}
  .sub{color:var(--muted); margin:0 0 24px; font-size:14px; text-align:center; max-width:380px}

  .picker{
    background:var(--white); border:1px solid var(--border); border-radius:20px;
    padding:22px 22px 18px; box-shadow:0 6px 24px rgba(0,0,0,.08); width:320px;
  }
  .pk-title{font-size:13px; color:var(--muted); letter-spacing:.4px; margin-bottom:14px}

  /* header HH : MM */
  .pk-head{display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:20px}
  .pk-field{
    font-size:52px; font-weight:600; font-variant-numeric:tabular-nums; line-height:1;
    background:var(--face); color:var(--text); border-radius:12px; padding:8px 12px;
    cursor:pointer; min-width:92px; text-align:center; transition:.12s; user-select:none;
  }
  .pk-field.act{background:var(--accent-soft); color:var(--accent-dark)}
  .pk-colon{font-size:48px; font-weight:600; color:var(--muted)}

  /* clock */
  .pk-clock{
    position:relative; width:256px; height:256px; margin:6px auto 0; border-radius:50%;
    background:var(--face); touch-action:none; user-select:none;
  }
  .pk-num{
    position:absolute; width:38px; height:38px; margin:-19px 0 0 -19px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:600; color:var(--text); border-radius:50%;
    z-index:3; pointer-events:none; transition:color .12s;
  }
  .pk-num.outer{font-size:13px; color:var(--muted)}
  .pk-num.on{color:#fff !important}
  .pk-center{position:absolute; left:50%; top:50%; width:9px; height:9px; margin:-4.5px 0 0 -4.5px;
    background:var(--accent); border-radius:50%; z-index:4}
  .pk-hand{position:absolute; left:50%; top:50%; width:2px; background:var(--accent);
    transform-origin:50% 0; z-index:2; transition:transform .18s ease, height .18s ease}
  .pk-sel{position:absolute; width:38px; height:38px; margin:-19px 0 0 -19px;
    background:var(--accent); border-radius:50%; z-index:2;
    transition:left .18s ease, top .18s ease; box-shadow:0 1px 3px rgba(0,0,0,.18)}
  .pk-sel.dragging, .pk-hand.dragging{transition:none}
  .pk-dot{position:absolute; left:50%; top:50%; width:5px; height:5px; margin:-2.5px 0 0 -2.5px;
    background:#fff; border-radius:50%; z-index:5; pointer-events:none}

  .pk-actions{display:flex; justify-content:flex-end; gap:18px; margin-top:16px}
  .pk-actions button{background:none; border:none; color:var(--accent-dark); font-size:15px;
    font-weight:600; cursor:pointer; padding:8px 6px}

  .out{margin-top:22px; font-size:14px; color:var(--accent-dark); background:var(--accent-soft);
    border:1px dashed var(--accent); border-radius:8px; padding:10px 16px}
  .out b{font-size:18px}
  .note{margin-top:14px; font-size:12.5px; color:var(--muted); max-width:330px; text-align:center}
</style>
</head>
<body>
  <h1>🕐 Επιλογή ώρας — σωστό Android 24ωρο</h1>
  <p class="sub">Πάτα μια ώρα στο καντράν → πάει μόνο του στα λεπτά. Έσω δαχτυλίδι = 12–11, έξω = 00 & 13–23.</p>

  <div class="picker">
    <div class="pk-title">ΕΠΙΛΟΓΗ ΩΡΑΣ</div>
    <div class="pk-head">
      <div class="pk-field act" id="fh">12</div>
      <span class="pk-colon">:</span>
      <div class="pk-field" id="fm">00</div>
    </div>
    <div class="pk-clock" id="clock">
      <div class="pk-hand" id="hand"></div>
      <div class="pk-sel" id="sel"></div>
      <div class="pk-dot" id="seldot"></div>
      <div class="pk-center"></div>
    </div>
    <div class="pk-actions">
      <button id="btnCancel">ΑΚΥΡΟ</button>
      <button id="btnOk">ΟΚ</button>
    </div>
  </div>

  <div class="out">Επιλεγμένη ώρα: <b id="result">12:00</b></div>
  <p class="note">Αυτό είναι το «καθαρό» #1. Αν σου αρέσει, το βάζω σε όλα τα σημεία της εφαρμογής όπου δηλώνεις ώρα.</p>

<script>
(function(){
  var CX=128, CY=128, OUTER=104, INNER=66, MID=86, NUM_R_OUT=104, NUM_R_IN=66;
  var clock=document.getElementById('clock'), hand=document.getElementById('hand'),
      sel=document.getElementById('sel'), seldot=document.getElementById('seldot');
  var H=12, M=0, mode='h';
  function pad(n){return String(n).padStart(2,'0');}

  // point for fraction f (0..1, 0 at top, clockwise) at radius R
  function pt(f,R){ var a=f*2*Math.PI - Math.PI/2; return {x:CX+R*Math.cos(a), y:CY+R*Math.sin(a)}; }

  // ---- build number rings for current mode ----
  function buildNumbers(){
    [].slice.call(clock.querySelectorAll('.pk-num')).forEach(function(n){n.remove();});
    if(mode==='h'){
      // inner ring: 12,1..11  (hour values 12,1..11) at slots 0..11
      for(var s=0;s<12;s++){ var hv = s===0?12:s; addNum(hv, pad(hv), s/12, NUM_R_IN, 'inner'); }
      // outer ring: 00,13..23 (hour values 0,13..23) at slots 0..11
      for(var s2=0;s2<12;s2++){ var hv2 = s2===0?0:s2+12; addNum(hv2, pad(hv2), s2/12, NUM_R_OUT, 'outer'); }
    } else {
      // minutes: 00,05,...55 on outer ring
      for(var mm=0;mm<60;mm+=5){ addNum(mm, pad(mm), mm/60, NUM_R_OUT, ''); }
    }
  }
  function addNum(val, label, f, R, cls){
    var p=pt(f,R), d=document.createElement('div');
    d.className='pk-num'+(cls?' '+cls:''); d.textContent=label;
    d.style.left=p.x+'px'; d.style.top=p.y+'px'; d.dataset.val=val; d.dataset.f=f; d.dataset.r=R;
    clock.appendChild(d);
  }

  // ---- redraw hand + selector + highlight ----
  function redraw(drag){
    var f, R, onVal;
    if(mode==='h'){
      var inner = (H>=1 && H<=12);    // 12,1..11 inner ; 0,13..23 outer
      R = inner?INNER:OUTER; f=(H%12)/12; onVal=H;
    } else { R=OUTER; f=M/60; onVal=M; }
    var p=pt(f,R);
    hand.style.height=R+'px';
    hand.style.transform='rotate('+(180+f*360)+'deg)';
    sel.style.left=p.x+'px'; sel.style.top=p.y+'px';
    seldot.style.left=p.x+'px'; seldot.style.top=p.y+'px';
    // show center dot inside selector only when it doesn't land exactly on a number
    var onNumber = (mode==='h') || (M%5===0);
    seldot.style.display = onNumber? 'none':'block';
    hand.classList.toggle('dragging', !!drag); sel.classList.toggle('dragging', !!drag);
    // highlight
    [].slice.call(clock.querySelectorAll('.pk-num')).forEach(function(n){
      n.classList.toggle('on', parseInt(n.dataset.val,10)===onVal);
    });
    document.getElementById('fh').textContent=pad(H);
    document.getElementById('fm').textContent=pad(M);
    document.getElementById('result').textContent=pad(H)+':'+pad(M);
  }

  function setMode(m){
    mode=m;
    document.getElementById('fh').classList.toggle('act', m==='h');
    document.getElementById('fm').classList.toggle('act', m==='m');
    buildNumbers(); redraw();
  }

  // ---- input from pointer ----
  function fromPoint(e, drag){
    var r=clock.getBoundingClientRect();
    var p=e.touches&&e.touches[0]?e.touches[0]:e;
    var dx=p.clientX-(r.left+CX), dy=p.clientY-(r.top+CY);
    var a=Math.atan2(dy,dx)+Math.PI/2; if(a<0)a+=2*Math.PI;
    if(mode==='h'){
      var slot=Math.round(a/(2*Math.PI)*12)%12;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>=MID){ H = slot===0?0:slot+12; }   // outer: 00,13..23
      else         { H = slot===0?12:slot; }       // inner: 12,1..11
    } else {
      M = Math.round(a/(2*Math.PI)*60)%60;
    }
    redraw(drag);
  }

  var down=false, moved=false;
  function start(e){ down=true; moved=false; fromPoint(e,true); e.preventDefault&&e.preventDefault(); }
  function move(e){ if(!down)return; moved=true; fromPoint(e,true); e.preventDefault&&e.preventDefault(); }
  function end(){ if(!down)return; down=false;
    redraw(false);
    if(mode==='h'){ setTimeout(function(){ setMode('m'); }, 180); }  // auto-advance to minutes
  }
  clock.addEventListener('mousedown',start); window.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  clock.addEventListener('touchstart',start,{passive:false}); clock.addEventListener('touchmove',move,{passive:false}); clock.addEventListener('touchend',end);

  document.getElementById('fh').onclick=function(){ setMode('h'); };
  document.getElementById('fm').onclick=function(){ setMode('m'); };
  document.getElementById('btnOk').onclick=function(){ document.getElementById('result').textContent=pad(H)+':'+pad(M)+'  ✓'; };
  document.getElementById('btnCancel').onclick=function(){ H=12;M=0;setMode('h'); };

  buildNumbers(); redraw();
})();
</script>
</body>
</html>
